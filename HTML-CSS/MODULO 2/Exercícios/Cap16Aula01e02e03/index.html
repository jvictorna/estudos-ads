<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap16Aula01e02e03</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            /* padding: 10px; */ 
            /* padding: 10px 20px 10px 30px; */ 

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;

            /* margin: 10px; */
            /* margin: 20px 20px 40px 20px; */ 

            outline-width: 10px;
            outline-style: dashed;
            outline-color: salmon;
        }

        p > a {
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }

        .btn {
            padding: 12px 24px;

            border-width: 2px;
            border-style: solid;
            border-color: darkblue;
            border-radius: 8px;

            margin: 10px;

            background-color: darkblue;
            color: white;
            display: inline-block;
            cursor: pointer;       
        }

        .btn-outline {
            padding: 12px 24px;

            border-width: 2px;
            border-style: solid;
            border-color: darkblue;
            border-radius: 8px;

            margin: 10px;

            background-color: white;
            color: darkblue;
            display: inline-block;
            cursor: pointer;
        }

        .btn:hover {
            background-color: navy;
            border-color: navy;
        }

        .btn-outline:hover {
            background-color: darkblue;
            color: white;
        }
    </style>
</head>
<body>
    <h1>MODELOS DE CAIXA</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    <h2>BOTÕES COM BOX MODEL</h2>
    <a href="#" class="btn">Botão Primário</a>
    <a href="#" class="btn-outline">Botão Outline</a>   
</body>
</html>
